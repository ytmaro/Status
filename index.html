<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FUNKILL STATUS</title>

<style>
body {
    background: #ffffff;
    font-family: Arial;
    text-align: center;
}

h1 {
    font-size: 50px;
    font-weight: bold;
    margin-top: 30px;
}

.container {
    width: 80%;
    margin: auto;
    margin-top: 30px;
}

.status-box {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    margin: 10px 0;
    border-radius: 20px;
    background: #f2f2f2;
    font-size: 20px;
}

.status {
    font-weight: bold;
}

.up {
    color: green;
}

.down {
    color: red;
}
</style>
</head>

<body>

<h1>FUNKILL</h1>

<div class="container">

<div class="status-box">
<span>FUNKILL WEBSITE</span>
<span class="status up">UP</span>
</div>

<div class="status-box">
<span>FUNKILL GAME SERVICE</span>
<span class="status down">DOWN</span>
</div>

<div class="status-box">
<span>FUNKILL RANK SERVER</span>
<span class="status up">UP</span>
</div>

<div class="status-box">
<span>FUNKILL LEADERBOARD</span>
<span class="status down">DOWN</span>
</div>

<div class="status-box">
<span>FUNKILL BOT</span>
<span class="status up">UP</span>
</div>

</div>

</body>
</html>
